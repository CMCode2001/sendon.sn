<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/sendon-favicon.png" />
    <link rel="apple-touch-icon" href="/sendon-favicon.png" />
    <meta name="theme-color" content="#C0392B" />

    <!-- SEO de base -->
    <title>SenDon — Donnez votre sang, sauvez des vies au Sénégal</title>
    <meta name="description" content="SenDon est la plateforme de don de sang au Sénégal. Trouvez un centre de collecte, prenez rendez-vous et rejoignez la communauté des donneurs de sang." />
    <meta name="keywords" content="don de sang, Sénégal, donneur de sang, transfusion, santé, SenDon, collecte sang Dakar" />
    <meta name="author" content="SenDon" />
    <link rel="canonical" href="https://sendon.sn/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sendon.sn/" />
    <meta property="og:title" content="SenDon — Donnez votre sang, sauvez des vies au Sénégal" />
    <meta property="og:description" content="SenDon est la plateforme de don de sang au Sénégal. Trouvez un centre de collecte, prenez rendez-vous et rejoignez la communauté des donneurs de sang." />
    <meta property="og:image" content="https://sendon.sn/logo-sendon.png" />
    <meta property="og:locale" content="fr_SN" />
    <meta property="og:site_name" content="SenDon" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://sendon.sn/" />
    <meta name="twitter:title" content="SenDon — Donnez votre sang, sauvez des vies au Sénégal" />
    <meta name="twitter:description" content="SenDon est la plateforme de don de sang au Sénégal. Trouvez un centre de collecte, prenez rendez-vous et rejoignez la communauté des donneurs de sang." />
    <meta name="twitter:image" content="https://sendon.sn/logo-sendon.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SenDon",
      "url": "https://sendon.sn",
      "logo": "https://sendon.sn/logo-sendon.png",
      "description": "Plateforme de don de sang au Sénégal. Connecter les donneurs aux centres de collecte pour sauver des vies.",
      "foundingLocation": {
        "@type": "Place",
        "name": "Dakar, Sénégal"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Sénégal"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["French", "Wolof"]
      },
      "sameAs": []
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SenDon",
      "url": "https://sendon.sn",
      "description": "Donnez votre sang, sauvez des vies au Sénégal",
      "inLanguage": "fr-SN"
    }
    </script>

    <div id="root"></div>
